<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juda tez yuklaydigan yangi narsa!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        button {
            background-color: #0078d4;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        button:hover {
            background-color: #005a9e;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
        .loader {
            display: none;
            margin: 15px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0078d4;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Tezda Yuklab Olish Testi</h2>
    <p>Tugmani bossangiz, TEZDA sizning diskingizga katta fayl bir sekundda yuklab bo'linadi. Bu juda zo'r!.</p>
    <button id="downloadBtn">Tezda faylni yuklash...</button>
    <div class="loader" id="loader"></div>
    <div class="status" id="status">Kutilmoqda...</div>
</div>

<script>
    document.getElementById('downloadBtn').addEventListener('click', async function() {
        const btn = this;
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');

        btn.disabled = true;
        loader.style.display = 'block';
        status.innerText = "";

        // RAMda sun'iy ravishda katta hajmli ma'lumot (Buffer) yaratamiz
        // Brauzer qotib qolmasligi uchun biroz kutish bilan bajaramiz
        setTimeout(() => {
            try {
                status.innerText = "SSDga yozilmoqda...";
                
                // Taxminan 300-400 MB lik sun'iy matnli ma'lumot qatori yaratamiz
                // Brauzer xavfsizligi va RAM kuchi uchun testga shu hajm yetadi
                const dummyText = "SSDHHDSSDHHDSSDHHDSSDHHDSSDHDDSSDHDD".repeat(40000000); 
                
                // Ma'lumotni Blob (Binary Large Object) ko'rinishida RAMga joylaymiz
                const blob = new Blob([dummyText], { type: "text/plain" });
                
                // RAMdagi ushbu ma'lumotga to'g'ridan-to'g'ri havola (URL) olamiz
                const fileUrl = URL.createObjectURL(blob);
                
                // Invisible (ko'rinmas) yuklash linki yaratamiz
                const a = document.createElement('a');
                a.href = fileUrl;
                a.download = "CHAROBZINE_hio_stickmanpartyheheh.ad.ad.ad.ad.ad.ad.ad.html"; // Yuklanadigan fayl nomi
                
                // Yuklashni boshlash (Shu soniyada RAMdan SSDga birdan o'tadi)
                a.click();
                
                // Xotirani tozalash (RAMni bo'shatish)
                URL.revokeObjectURL(fileUrl);

                status.innerText = "Yuklab bo'lindi! (1 sekund ichida SSDga yozildi)";
                status.style.color = "green";
            } catch (error) {
                status.innerText = "Xatolik: RAM yetmadi (Chunki bunga ko'p RAM kerak) yoki brauzer cheklovi";
                status.style.color = "red";
                console.error(error);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }, 1000); // 1 sekundlik boshlang'ich kechikish
    });
</script>

</body>
</html>
